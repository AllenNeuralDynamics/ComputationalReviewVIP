version: 1
extends:
  - authors.yml
project:
  title: "VIP Interneurons: From Molecular Identity to Circuit Function"
  subtitle: A Reproducible Computational Review
  description: >
    A computational critical review of VIP-expressing cortical interneurons —
    molecular identity, development, morphology, intrinsic physiology, synaptic
    connectivity, circuit motifs, in vivo dynamics, regional diversity,
    oscillations, translation to primate/human/disease, and computational models.
  keywords:
    - neuroscience
    - VIP interneurons
    - disinhibition
    - cortical microcircuits
    - critical review
    - reproducible research
  license: MIT
  open_access: true
  plugins:
    - plugins/citation-annotation-plugin.mjs
    - plugins/authorship-plugin.mjs
    - plugins/evidence-explorer-plugin.mjs
  github: https://github.com/AllenNeuralDynamics/ComputationalReviewVIP
  bibliography:
    - content/references.bib
  toc:
    - file: content/abstract.md
    - file: content/sec-01-introduction.md
    - file: content/sec-02-molecular-identity.md
    - file: content/sec-03-developmental-origins.md
    - file: content/sec-04-morphological-diversity.md
    - file: content/sec-05-intrinsic-electrophysiology.md
    - file: content/sec-06-synaptic-physiology.md
    - file: content/sec-07-local-circuit-motifs.md
    - file: content/sec-08-in-vivo-dynamics-behavior.md
    - file: content/sec-09-brain-region-context.md
    - file: content/sec-10-oscillations-network-dynamics.md
    - file: content/sec-11-species-translation-disease.md
    - file: content/sec-12-computational-models.md
    - file: content/sec-13-synthesis.md
    - file: content/sec-14-conclusion.md
site:
  template: book-theme
  title: "VIP Interneurons — Computational Review"
  nav:
    - title: Abstract
      file: content/abstract.md
    - title: GitHub
      url: https://github.com/AllenNeuralDynamics/ComputationalReviewVIP
