name: Build and Deploy MyST Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install mystmd jupyter matplotlib numpy pandas seaborn
          npm install -g mystmd
          npm install yaml

      - name: Execute figure notebooks
        run: |
          if ls figures/notebooks/*.ipynb 1>/dev/null 2>&1; then
            for nb in figures/notebooks/*.ipynb; do
              echo "Executing $nb..."
              jupyter execute "$nb" --timeout=120
            done
          else
            echo "No figure notebooks found"
          fi

      - name: Install LaTeX (for PDF rebuild)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra latexmk

      - name: Rebuild PDF from manuscript.tex
        # Rebuilds exports/ComputationalReviewVIP.pdf from the audited LaTeX source.
        # The LaTeX file is the canonical typeset artifact (Phase 14 final assembly).
        # MyST bundles ./exports/ComputationalReviewVIP.pdf as a download via the
        # `downloads:` field in myst.yml — see https://mystmd.org/guide/website-downloads
        run: |
          mkdir -p _pdf_build
          cp manuscript.tex _pdf_build/
          cp content/references.bib _pdf_build/
          cp -r figures _pdf_build/
          cd _pdf_build
          latexmk -pdf -interaction=nonstopmode -f -file-line-error manuscript.tex || true
          if [ -f manuscript.pdf ]; then
            mkdir -p ../exports
            cp manuscript.pdf ../exports/ComputationalReviewVIP.pdf
            echo "PDF rebuilt: $(stat -c%s ../exports/ComputationalReviewVIP.pdf) bytes"
          else
            echo "WARNING: PDF rebuild failed; keeping committed version"
          fi

      - name: Build MyST site
        env:
          BASE_URL: /ComputationalReviewVIP
        run: myst build --html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
